name: work-hours-platform

services:
  api:
    image: ghcr.io/your-github-user/work-hours-api:latest
    env_file:
      - .env
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test: [
        "CMD",
        "node",
        "-e",
        "fetch('http://127.0.0.1:8080/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

