version: "2.1"

services:
  api:
    image: ${API_IMAGE:-ghcr.io/carlobonvicini/work-hours-api:latest}
    env_file:
      - .env
    volumes:
      - ./updates:/app/updates
    ports:
      - "${API_PORT_MAPPING:-8080:8080}"
    expose:
      - "8080"
    restart: unless-stopped

  caddy:
    profiles:
      - public
    image: caddy:2.10-alpine
    depends_on:
      - api
    env_file:
      - .env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    ports:
      - "${HTTP_PORT_MAPPING:-80:80}"
      - "${HTTPS_PORT_MAPPING:-443:443}"
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
