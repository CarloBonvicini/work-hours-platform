version: "2.1"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-workhours}
      POSTGRES_USER: ${POSTGRES_USER:-workhours}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    image: ${API_IMAGE}
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./updates:/app/updates
      - ./tickets:/app/tickets
    ports:
      - "8080:8080"
    expose:
      - "8080"
    restart: unless-stopped

volumes:
  postgres_data:
