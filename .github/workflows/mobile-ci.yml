name: Mobile CI

on:
  push:
    paths:
      - "mobile/**"
      - ".github/workflows/mobile-ci.yml"
  pull_request:
    paths:
      - "mobile/**"
      - ".github/workflows/mobile-ci.yml"

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect Flutter project
        id: detect
        shell: bash
        run: |
          if [ -f "mobile/pubspec.yaml" ]; then
            echo "has_flutter=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_flutter=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip (no pubspec.yaml yet)
        if: ${{ steps.detect.outputs.has_flutter == 'false' }}
        run: echo "Nessun progetto Flutter in mobile/. CI mobile saltata."

      - name: Setup Flutter
        if: ${{ steps.detect.outputs.has_flutter == 'true' }}
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        if: ${{ steps.detect.outputs.has_flutter == 'true' }}
        working-directory: mobile
        run: flutter pub get

      - name: Analyze
        if: ${{ steps.detect.outputs.has_flutter == 'true' }}
        working-directory: mobile
        run: flutter analyze

      - name: Tests
        if: ${{ steps.detect.outputs.has_flutter == 'true' }}
        working-directory: mobile
        run: flutter test
