name: Mobile CI

on:
  push:
    branches:
      - main
    paths:
      - "mobile/**"
      - ".github/workflows/mobile-ci.yml"
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read
  statuses: write

concurrency:
  group: mobile-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  analyze-and-test:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Detect mobile changes
        id: changes
        shell: bash
        run: |
          set -eu

          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "has_mobile_changes=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          base_sha="${{ github.event.pull_request.base.sha }}"
          head_sha="${{ github.sha }}"
          changed_files="$(git diff --name-only "$base_sha...$head_sha")"

          if printf '%s\n' "$changed_files" | grep -E -q '^(mobile/|\.github/workflows/mobile-ci\.yml$)'; then
            echo "has_mobile_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_mobile_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect Flutter project
        id: detect
        shell: bash
        run: |
          if [ -f "mobile/pubspec.yaml" ]; then
            echo "has_flutter=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_flutter=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip (no mobile changes)
        if: ${{ steps.changes.outputs.has_mobile_changes != 'true' }}
        run: echo "Nessuna modifica mobile in questa PR. Mobile CI marcata come riuscita."

      - name: Skip (no pubspec.yaml yet)
        if: ${{ steps.changes.outputs.has_mobile_changes == 'true' && steps.detect.outputs.has_flutter == 'false' }}
        run: echo "Nessun progetto Flutter in mobile/. CI mobile saltata."

      - name: Setup Flutter SDK
        if: ${{ steps.changes.outputs.has_mobile_changes == 'true' && steps.detect.outputs.has_flutter == 'true' }}
        shell: bash
        run: |
          set -eu
          FLUTTER_ROOT="$RUNNER_TEMP/flutter-sdk"
          git clone --depth 1 -b stable https://github.com/flutter/flutter.git "$FLUTTER_ROOT"
          echo "$FLUTTER_ROOT/bin" >> "$GITHUB_PATH"
          export PATH="$FLUTTER_ROOT/bin:$PATH"
          flutter --version

      - name: Install dependencies
        if: ${{ steps.changes.outputs.has_mobile_changes == 'true' && steps.detect.outputs.has_flutter == 'true' }}
        working-directory: mobile
        run: flutter pub get

      - name: Analyze
        if: ${{ steps.changes.outputs.has_mobile_changes == 'true' && steps.detect.outputs.has_flutter == 'true' }}
        working-directory: mobile
        run: flutter analyze

      - name: Tests
        if: ${{ steps.changes.outputs.has_mobile_changes == 'true' && steps.detect.outputs.has_flutter == 'true' }}
        working-directory: mobile
        run: flutter test --concurrency=4

      - name: Publish PR required status context
        if: ${{ always() && github.event_name == 'pull_request' }}
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          STATUS_SHA: ${{ github.event.pull_request.head.sha }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -eu

          state="success"
          description="Mobile CI completata."
          case "${{ job.status }}" in
            success)
              state="success"
              description="Mobile CI completata."
              ;;
            failure)
              state="failure"
              description="Mobile CI fallita."
              ;;
            cancelled)
              state="error"
              description="Mobile CI annullata."
              ;;
            *)
              state="error"
              description="Mobile CI in stato inatteso."
              ;;
          esac

          payload="$(cat <<EOF
          {
            \"state\": \"$state\",
            \"target_url\": \"$RUN_URL\",
            \"description\": \"$description\",
            \"context\": \"Mobile CI / analyze-and-test (pull_request)\"
          }
          EOF
          )"

          curl -fsSL \
            -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -d "$payload" \
            "https://api.github.com/repos/$REPOSITORY/statuses/$STATUS_SHA" \
            >/dev/null
