name: Mobile CI

on:
  push:
    branches:
      - main
    paths:
      - "mobile/**"
      - ".github/workflows/mobile-ci.yml"
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    paths:
      - "mobile/**"
      - ".github/workflows/mobile-ci.yml"

permissions:
  contents: read

concurrency:
  group: mobile-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  analyze-and-test:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Detect Flutter project
        id: detect
        shell: bash
        run: |
          if [ -f "mobile/pubspec.yaml" ]; then
            echo "has_flutter=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_flutter=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip (no pubspec.yaml yet)
        if: ${{ steps.detect.outputs.has_flutter == 'false' }}
        run: echo "Nessun progetto Flutter in mobile/. CI mobile saltata."

      - name: Setup Flutter
        if: ${{ steps.detect.outputs.has_flutter == 'true' }}
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        if: ${{ steps.detect.outputs.has_flutter == 'true' }}
        working-directory: mobile
        run: flutter pub get

      - name: Analyze
        if: ${{ steps.detect.outputs.has_flutter == 'true' }}
        working-directory: mobile
        run: flutter analyze

      - name: Tests
        if: ${{ steps.detect.outputs.has_flutter == 'true' }}
        working-directory: mobile
        run: flutter test --concurrency=4
