name: Backend CI

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read

concurrency:
  group: backend-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Detect backend changes
        id: detect
        shell: bash
        run: |
          set -eu

          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "has_backend_changes=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          base_sha="${{ github.event.pull_request.base.sha }}"
          head_sha="${{ github.sha }}"
          changed_files="$(git diff --name-only "$base_sha...$head_sha")"

          if printf '%s\n' "$changed_files" | grep -E -q '^(backend/|\.github/workflows/backend-ci\.yml$)'; then
            echo "has_backend_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_backend_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip (no backend changes)
        if: ${{ steps.detect.outputs.has_backend_changes != 'true' }}
        run: echo "Nessuna modifica backend in questa PR. Backend CI marcata come riuscita."

      - name: Setup Node
        if: ${{ steps.detect.outputs.has_backend_changes == 'true' }}
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        if: ${{ steps.detect.outputs.has_backend_changes == 'true' }}
        run: npm ci

      - name: Lint
        if: ${{ steps.detect.outputs.has_backend_changes == 'true' }}
        run: npm run lint

      - name: Run tests
        if: ${{ steps.detect.outputs.has_backend_changes == 'true' }}
        run: npm test

      - name: Build
        if: ${{ steps.detect.outputs.has_backend_changes == 'true' }}
        run: npm run build
