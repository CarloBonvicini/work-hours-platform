name: Backend CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build_and_push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set image name
        run: echo "IMAGE_NAME=ghcr.io/carlobonvicini/work-hours-api" >> "$GITHUB_ENV"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        env:
          DOCKER_BUILD_SUMMARY: "false"
          DOCKER_BUILD_RECORD_UPLOAD: "false"
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}

  deploy:
    name: Deploy (Self-hosted runner)
    needs: build_and_push
    runs-on: self-hosted
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Verify RUNTIME_ENV_FILE
        shell: bash
        env:
          RUNTIME_ENV_FILE: ${{ secrets.RUNTIME_ENV_FILE }}
        run: |
          set -eu
          if [ -z "$RUNTIME_ENV_FILE" ]; then
            echo "Secret RUNTIME_ENV_FILE mancante. Configuralo in Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: Login to GHCR (pull private image)
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Write infra/.env from secret
        shell: bash
        env:
          RUNTIME_ENV_FILE: ${{ secrets.RUNTIME_ENV_FILE }}
        run: |
          set -eu
          cat > infra/.env <<'EOF_ENV'
          ${{ secrets.RUNTIME_ENV_FILE }}
          EOF_ENV

          API_IMAGE="ghcr.io/carlobonvicini/work-hours-api:latest"
          if grep -q '^API_IMAGE=' infra/.env; then
            sed -i "s|^API_IMAGE=.*|API_IMAGE=${API_IMAGE}|" infra/.env
          else
            printf '\nAPI_IMAGE=%s\n' "${API_IMAGE}" >> infra/.env
          fi

      - name: Pull and restart containers
        shell: bash
        run: |
          set -eu
          # Evita endpoint Docker ereditati dal runner service.
          unset DOCKER_HOST DOCKER_TLS_VERIFY DOCKER_CERT_PATH

          if ! docker info >/dev/null 2>&1; then
            echo "Docker daemon non raggiungibile dal runner."
            echo "Verifica che Docker sia avviato e che l'utente del runner sia nel gruppo docker."
            exit 1
          fi

          cd infra

          compose() {
            if docker compose version >/dev/null 2>&1; then
              docker compose "$@"
            elif command -v docker-compose >/dev/null 2>&1; then
              docker-compose "$@"
            else
              echo "Docker Compose non trovato sul self-hosted runner."
              exit 1
            fi
          }

          compose_files=(-f docker-compose.yml)
          app_domain="$(grep '^APP_DOMAIN=' .env | cut -d= -f2- || true)"
          if [ -n "$app_domain" ]; then
            compose_files+=(-f docker-compose.public.yml)
          fi

          compose "${compose_files[@]}" pull
          compose "${compose_files[@]}" up -d --remove-orphans
          docker image prune -f
