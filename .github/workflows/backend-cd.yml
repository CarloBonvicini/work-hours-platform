name: Backend CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build_and_push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name
        run: echo "IMAGE_NAME=ghcr.io/carlobonvicini/work-hours-api" >> "$GITHUB_ENV"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}

  deploy:
    needs: build_and_push
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      RUNTIME_ENV_FILE: ${{ secrets.RUNTIME_ENV_FILE }}

    steps:
      - name: Skip deploy if secrets are missing
        if: ${{ env.DEPLOY_HOST == '' || env.DEPLOY_USER == '' || env.DEPLOY_SSH_KEY == '' || env.DEPLOY_PATH == '' || env.RUNTIME_ENV_FILE == '' }}
        run: echo "Secrets deploy mancanti, salto il deploy SSH."

      - name: Deploy via SSH
        if: ${{ env.DEPLOY_HOST != '' && env.DEPLOY_USER != '' && env.DEPLOY_SSH_KEY != '' && env.DEPLOY_PATH != '' && env.RUNTIME_ENV_FILE != '' }}
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ env.DEPLOY_SSH_KEY }}
          script: |
            set -eu
            cd "${{ env.DEPLOY_PATH }}"
            git fetch origin main --tags
            git checkout main
            git pull --ff-only origin main
            cd infra
            cat > .env <<'EOF_ENV'
${{ env.RUNTIME_ENV_FILE }}
EOF_ENV

            API_IMAGE="ghcr.io/carlobonvicini/work-hours-api:latest"
            if [ -f .env ] && grep -q '^API_IMAGE=' .env; then
              sed -i "s|^API_IMAGE=.*|API_IMAGE=${API_IMAGE}|" .env
            else
              printf '\nAPI_IMAGE=%s\n' "${API_IMAGE}" >> .env
            fi

            sh deploy.sh
