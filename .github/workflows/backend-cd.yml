name: Backend CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: backend-cd-main
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

env:
  DEPLOY_BRANCH: main

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      bump_type: ${{ steps.bump.outputs.bump_type }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Compute next version
        id: bump
        shell: bash
        run: |
          set -euo pipefail

          existing_tag="$(git tag --points-at "$GITHUB_SHA" --list 'v[0-9]*.[0-9]*.[0-9]*' | sort -V | tail -n 1 || true)"
          if [ -n "$existing_tag" ]; then
            echo "version=$existing_tag" >> "$GITHUB_OUTPUT"
            echo "bump_type=existing" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          latest_tag="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-version:refname | head -n 1)"
          if [ -z "$latest_tag" ]; then
            latest_tag="v0.0.0"
          fi

          raw="${latest_tag#v}"
          IFS='.' read -r major minor patch <<< "$raw"

          commit_message="$(git log -1 --pretty=%B)"
          bump_type="patch"
          if grep -q 'RELEASE+' <<< "$commit_message"; then
            bump_type="major"
          elif grep -q 'RELEASE' <<< "$commit_message"; then
            bump_type="minor"
          fi

          case "$bump_type" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
          esac

          next_version="v${major}.${minor}.${patch}"
          echo "version=$next_version" >> "$GITHUB_OUTPUT"
          echo "bump_type=$bump_type" >> "$GITHUB_OUTPUT"

      - name: Create and push version tag
        if: ${{ steps.bump.outputs.bump_type != 'existing' }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.bump.outputs.version }}" "$GITHUB_SHA"
          git push origin "${{ steps.bump.outputs.version }}"

  build-and-push:
    needs: version
    runs-on: ubuntu-latest
    outputs:
      image_name: ${{ steps.prep.outputs.image_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare image name
        id: prep
        run: |
          echo "image_name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/work-hours-api" >> "$GITHUB_OUTPUT"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.prep.outputs.image_name }}
          tags: |
            type=sha
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ steps.prep.outputs.image_name }}:latest
            ${{ steps.prep.outputs.image_name }}:${{ needs.version.outputs.version }}
            ${{ steps.prep.outputs.image_name }}:sha-${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: [version, build-and-push]
    if: ${{ secrets.DEPLOY_HOST != '' && secrets.DEPLOY_USER != '' && secrets.DEPLOY_SSH_KEY != '' && secrets.DEPLOY_PATH != '' }}
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -eu
            cd "${{ secrets.DEPLOY_PATH }}"
            git fetch origin "${{ env.DEPLOY_BRANCH }}" --tags
            git checkout "${{ env.DEPLOY_BRANCH }}"
            git pull --ff-only origin "${{ env.DEPLOY_BRANCH }}"
            cd infra
            export API_IMAGE="${{ needs.build-and-push.outputs.image_name }}:${{ needs.version.outputs.version }}"
            sh deploy.sh
