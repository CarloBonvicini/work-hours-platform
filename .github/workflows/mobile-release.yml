name: Mobile Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Tag della release (es. mobile-v0.1.0)
        required: true
        type: string
      build_name:
        description: Versione app (es. 0.1.0)
        required: true
        type: string
      build_number:
        description: Build number Android
        required: true
        default: "1"
        type: string
      release_name:
        description: Titolo release
        required: true
        default: "Work Hours Mobile"
        type: string
      release_notes:
        description: Novita della release (testo libero mostrato in app nel banner New Feature)
        required: false
        type: string
      api_base_url:
        description: Base URL backend per l'app mobile (es. https://api.example.com)
        required: false
        type: string
      update_base_url:
        description: Base URL pubblica del backend che esporra gli update (es. https://updates.example.com)
        required: false
        type: string
      update_feed_url:
        description: Feed pubblica update per il client (es. https://auth.autocaptionservices.work/work-hours/latest.json)
        required: false
        type: string
      update_page_url:
        description: Pagina pubblica release/download per il client
        required: false
        type: string
  push:
    tags:
      - "mobile-v*"

jobs:
  mark-mobile-release-in-progress:
    name: Mark Mobile Release In Progress
    if: >-
      ${{
        github.repository == 'CarloBonvicini/work-hours-platform' &&
        (
          github.event_name == 'workflow_dispatch' ||
          startsWith(github.ref, 'refs/tags/mobile-v')
        )
      }}
    runs-on: self-hosted
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          clean: false

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "release_tag=${{ inputs.release_tag }}" >> "$GITHUB_OUTPUT"
            echo "build_name=${{ inputs.build_name }}" >> "$GITHUB_OUTPUT"
            echo "build_number=${{ inputs.build_number }}" >> "$GITHUB_OUTPUT"
          else
            tag="${GITHUB_REF_NAME}"
            version="${tag#mobile-v}"
            echo "release_tag=$tag" >> "$GITHUB_OUTPUT"
            echo "build_name=$version" >> "$GITHUB_OUTPUT"
            echo "build_number=${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve mobile update target
        id: update
        shell: bash
        env:
          INPUT_UPDATE_BASE_URL: ${{ inputs.update_base_url }}
          SECRET_UPDATE_BASE_URL: ${{ secrets.MOBILE_UPDATE_BASE_URL }}
        run: |
          sanitize_value() {
            printf '%s' "$1" | tr -d '\r\n'
          }

          if [ -n "$INPUT_UPDATE_BASE_URL" ]; then
            update_base_url="$(sanitize_value "${INPUT_UPDATE_BASE_URL%/}")"
          elif [ -n "$SECRET_UPDATE_BASE_URL" ]; then
            update_base_url="$(sanitize_value "${SECRET_UPDATE_BASE_URL%/}")"
          else
            update_base_url=""
          fi

          if [ -n "$update_base_url" ]; then
            echo "publish_update_feed=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish_update_feed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Mark release as publishing
        if: ${{ steps.update.outputs.publish_update_feed == 'true' }}
        shell: bash
        run: |
          set -eu

          updates_dir="infra/updates"
          mkdir -p "$updates_dir"

          cat > "$updates_dir/release-status.json" <<EOF_STATUS
          {
            "state": "publishing",
            "tag": "${{ steps.meta.outputs.release_tag }}",
            "version": "${{ steps.meta.outputs.build_name }}",
            "buildNumber": "${{ steps.meta.outputs.build_number }}",
            "startedAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF_STATUS

  build-and-release-android:
    needs: mark-mobile-release-in-progress
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      build_name: ${{ steps.meta.outputs.build_name }}
      build_number: ${{ steps.meta.outputs.build_number }}
      publish_update_feed: ${{ steps.update.outputs.publish_update_feed }}

    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Resolve release metadata
        id: meta
        shell: bash
        working-directory: .
        run: |
          sanitize_value() {
            printf '%s' "$1" | tr -d '\r'
          }

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "release_tag=${{ inputs.release_tag }}" >> "$GITHUB_OUTPUT"
            echo "build_name=${{ inputs.build_name }}" >> "$GITHUB_OUTPUT"
            echo "build_number=${{ inputs.build_number }}" >> "$GITHUB_OUTPUT"
            echo "release_name=${{ inputs.release_name }}" >> "$GITHUB_OUTPUT"
            release_notes="$(sanitize_value "${{ inputs.release_notes }}")"
          else
            tag="${GITHUB_REF_NAME}"
            version="${tag#mobile-v}"
            echo "release_tag=$tag" >> "$GITHUB_OUTPUT"
            echo "build_name=$version" >> "$GITHUB_OUTPUT"
            echo "build_number=${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
            echo "release_name=Work Hours Mobile $version" >> "$GITHUB_OUTPUT"
            release_notes="$(git log -1 --pretty=%s)"
          fi

          if [ -z "${release_notes// }" ]; then
            release_notes="Aggiornamenti di stabilita e miglioramenti."
          fi

          {
            echo "release_notes<<EOF_NOTES"
            printf '%s\n' "$release_notes"
            echo "EOF_NOTES"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve mobile API base URL
        shell: bash
        working-directory: .
        env:
          INPUT_API_BASE_URL: ${{ inputs.api_base_url }}
          SECRET_API_BASE_URL: ${{ secrets.MOBILE_API_BASE_URL }}
        run: |
          sanitize_value() {
            printf '%s' "$1" | tr -d '\r\n'
          }

          if [ -n "$INPUT_API_BASE_URL" ]; then
            api_base_url="$INPUT_API_BASE_URL"
          elif [ -n "$SECRET_API_BASE_URL" ]; then
            api_base_url="$SECRET_API_BASE_URL"
          else
            echo "API base URL mancante."
            echo "Configura il secret MOBILE_API_BASE_URL oppure passa l input api_base_url nel workflow manuale."
            exit 1
          fi

          api_base_url="$(sanitize_value "$api_base_url")"
          echo "API_BASE_URL=$api_base_url" >> "$GITHUB_ENV"

      - name: Resolve mobile update feed
        id: update
        shell: bash
        working-directory: .
        env:
          INPUT_UPDATE_BASE_URL: ${{ inputs.update_base_url }}
          INPUT_UPDATE_FEED_URL: ${{ inputs.update_feed_url }}
          INPUT_UPDATE_PAGE_URL: ${{ inputs.update_page_url }}
          SECRET_UPDATE_BASE_URL: ${{ secrets.MOBILE_UPDATE_BASE_URL }}
          SECRET_UPDATE_FEED_URL: ${{ secrets.MOBILE_UPDATE_FEED_URL }}
          SECRET_UPDATE_PAGE_URL: ${{ secrets.MOBILE_UPDATE_PAGE_URL }}
        run: |
          sanitize_value() {
            printf '%s' "$1" | tr -d '\r\n'
          }

          if [ -n "$INPUT_UPDATE_BASE_URL" ]; then
            update_base_url="$(sanitize_value "${INPUT_UPDATE_BASE_URL%/}")"
          elif [ -n "$SECRET_UPDATE_BASE_URL" ]; then
            update_base_url="$(sanitize_value "${SECRET_UPDATE_BASE_URL%/}")"
          else
            update_base_url=""
          fi

          if [ -n "$update_base_url" ]; then
            update_feed_url="$update_base_url/mobile-updates/latest.json"
            update_page_url="$update_base_url/mobile-updates/releases/latest"
          elif [ -n "$INPUT_UPDATE_FEED_URL" ]; then
            update_feed_url="$(sanitize_value "$INPUT_UPDATE_FEED_URL")"
          elif [ -n "$SECRET_UPDATE_FEED_URL" ]; then
            update_feed_url="$(sanitize_value "$SECRET_UPDATE_FEED_URL")"
          else
            update_feed_url="https://api.github.com/repos/CarloBonvicini/work-hours-platform/releases/latest"
          fi

          if [ -n "$INPUT_UPDATE_PAGE_URL" ]; then
            update_page_url="$(sanitize_value "$INPUT_UPDATE_PAGE_URL")"
          elif [ -n "$SECRET_UPDATE_PAGE_URL" ]; then
            update_page_url="$(sanitize_value "$SECRET_UPDATE_PAGE_URL")"
          else
            update_page_url="https://github.com/CarloBonvicini/work-hours-platform/releases/latest"
          fi

          echo "UPDATE_FEED_URL=$update_feed_url" >> "$GITHUB_ENV"
          echo "UPDATE_PAGE_URL=$update_page_url" >> "$GITHUB_ENV"

          if [ -n "$update_base_url" ]; then
            echo "publish_update_feed=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish_update_feed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter SDK
        shell: bash
        run: |
          set -eu
          FLUTTER_ROOT="$RUNNER_TEMP/flutter-sdk"
          git clone --depth 1 -b stable https://github.com/flutter/flutter.git "$FLUTTER_ROOT"
          echo "$FLUTTER_ROOT/bin" >> "$GITHUB_PATH"
          export PATH="$FLUTTER_ROOT/bin:$PATH"
          flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Prepare Android release signing
        shell: bash
        working-directory: .
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ] || [ -z "$ANDROID_KEY_ALIAS" ] || [ -z "$ANDROID_KEYSTORE_PASSWORD" ] || [ -z "$ANDROID_KEY_PASSWORD" ]; then
            echo "ANDROID signing secrets mancanti."
            echo "Configura ANDROID_KEYSTORE_BASE64, ANDROID_KEY_ALIAS, ANDROID_KEYSTORE_PASSWORD e ANDROID_KEY_PASSWORD."
            echo "Le release non firmate sempre con la stessa chiave causano conflitti di package negli update Android."
            exit 1
          fi

          sanitize_value() {
            printf '%s' "$1" | tr -d '\r\n'
          }

          keystore_path="$GITHUB_WORKSPACE/mobile/android/release.keystore"
          keystore_base64="$(sanitize_value "$ANDROID_KEYSTORE_BASE64")"
          key_alias="$(sanitize_value "$ANDROID_KEY_ALIAS")"
          keystore_password="$(sanitize_value "$ANDROID_KEYSTORE_PASSWORD")"
          key_password="$(sanitize_value "$ANDROID_KEY_PASSWORD")"

          printf '%s' "$keystore_base64" | base64 --decode > "$keystore_path"

          if ! keytool -list \
            -keystore "$keystore_path" \
            -storetype PKCS12 \
            -storepass "$keystore_password" \
            -alias "$key_alias" >/dev/null 2>&1; then
            echo "Impossibile leggere il keystore release con alias/password configurati."
            echo "Verifica i secret ANDROID_KEYSTORE_BASE64, ANDROID_KEY_ALIAS, ANDROID_KEYSTORE_PASSWORD e ANDROID_KEY_PASSWORD."
            exit 1
          fi

          {
            echo "ANDROID_KEYSTORE_PATH=$keystore_path"
            echo "ANDROID_KEY_ALIAS=$key_alias"
            echo "ANDROID_KEYSTORE_PASSWORD=$keystore_password"
            echo "ANDROID_KEY_PASSWORD=$key_password"
          } >> "$GITHUB_ENV"

      - name: Configure Firebase Android project (optional)
        shell: bash
        working-directory: .
        env:
          FIREBASE_ANDROID_CONFIG_BASE64: ${{ secrets.FIREBASE_ANDROID_CONFIG_BASE64 }}
        run: |
          set -eu

          if [ -z "${FIREBASE_ANDROID_CONFIG_BASE64}" ]; then
            echo "FIREBASE_ANDROID_CONFIG_BASE64 non configurato: notifiche push remote disabilitate per questa build."
            exit 0
          fi

          printf '%s' "${FIREBASE_ANDROID_CONFIG_BASE64}" | base64 --decode > mobile/android/app/google-services.json
          echo "google-services.json generato da secret."

      - name: Build release APK
        shell: bash
        run: |
          flutter build apk --release \
            --build-name="${{ steps.meta.outputs.build_name }}" \
            --build-number="${{ steps.meta.outputs.build_number }}" \
            --dart-define=API_BASE_URL="${API_BASE_URL}" \
            --dart-define=APP_VERSION="${{ steps.meta.outputs.build_name }}" \
            --dart-define=UPDATE_FEED_URL="${UPDATE_FEED_URL}" \
            --dart-define=UPDATE_PAGE_URL="${UPDATE_PAGE_URL}"

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        working-directory: .
        run: |
          tag="${{ steps.meta.outputs.release_tag }}"
          title="${{ steps.meta.outputs.release_name }}"
          notes_file="$(mktemp)"
          cat > "$notes_file" <<'EOF_NOTES'
          ${{ steps.meta.outputs.release_notes }}
          EOF_NOTES

          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" --title "$title" --notes-file "$notes_file"
          else
            gh release edit "$tag" --title "$title" --notes-file "$notes_file"
          fi

          gh release upload "$tag" mobile/build/app/outputs/flutter-apk/app-release.apk --clobber
          rm -f "$notes_file"

  publish-mobile-update-feed:
    name: Publish Mobile Update Feed
    needs: [mark-mobile-release-in-progress, build-and-release-android]
    if: >-
      ${{
        github.repository == 'CarloBonvicini/work-hours-platform' &&
        needs.build-and-release-android.outputs.publish_update_feed == 'true' &&
        (
          github.event_name == 'workflow_dispatch' ||
          startsWith(github.ref, 'refs/tags/mobile-v')
        )
      }}
    runs-on: self-hosted
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          clean: false

      - name: Sync update metadata and apk to server workspace
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.build-and-release-android.outputs.release_tag }}
          BUILD_NAME: ${{ needs.build-and-release-android.outputs.build_name }}
          BUILD_NUMBER: ${{ needs.build-and-release-android.outputs.build_number }}
        run: |
          set -eu

          updates_dir="infra/updates"
          downloads_dir="$updates_dir/downloads"
          mkdir -p "$downloads_dir"

          release_api="https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG}"
          release_json="$(curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${release_api}")"

          asset_api_url="$(printf '%s' "$release_json" | python3 -c "import json,sys; data=json.load(sys.stdin); assets=data.get('assets', []); apk=next((asset for asset in assets if asset.get('name', '').endswith('.apk')), None); print(apk.get('url', '') if apk else '')")"
          published_at="$(printf '%s' "$release_json" | python3 -c "import json,sys; data=json.load(sys.stdin); print(data.get('published_at') or '')")"
          release_notes="$(printf '%s' "$release_json" | python3 -c "import json,sys; data=json.load(sys.stdin); print(data.get('body') or '')")"

          if [ -z "$asset_api_url" ]; then
            echo "Asset APK non trovato nella release ${RELEASE_TAG}."
            exit 1
          fi

          deployed_file_name="work-hours-mobile-${BUILD_NAME}.apk"
          deployed_file_path="$downloads_dir/$deployed_file_name"

          curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/octet-stream" \
            "${asset_api_url}" \
            -o "${deployed_file_path}"

          RELEASE_NOTES="${release_notes}" \
          PUBLISHED_AT="${published_at}" \
          DEPLOYED_FILE_NAME="${deployed_file_name}" \
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          metadata = {
              "tag": os.environ["RELEASE_TAG"],
              "version": os.environ["BUILD_NAME"],
              "buildNumber": os.environ["BUILD_NUMBER"],
              "fileName": os.environ["DEPLOYED_FILE_NAME"],
              "releaseNotes": os.environ.get("RELEASE_NOTES") or None,
              "publishedAt": os.environ.get("PUBLISHED_AT") or None,
          }

          target_path = Path("infra/updates/latest-release.json")
          target_path.parent.mkdir(parents=True, exist_ok=True)
          target_path.write_text(
              json.dumps(metadata, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )
          PY

          rm -f "$updates_dir/release-status.json"

      - name: Notify devices about new mobile update (optional)
        shell: bash
        env:
          MOBILE_UPDATE_BASE_URL: ${{ secrets.MOBILE_UPDATE_BASE_URL }}
          MOBILE_PUSH_NOTIFY_TOKEN: ${{ secrets.MOBILE_PUSH_NOTIFY_TOKEN }}
        run: |
          set -eu

          if [ -z "${MOBILE_UPDATE_BASE_URL}" ] || [ -z "${MOBILE_PUSH_NOTIFY_TOKEN}" ]; then
            echo "Skip notifica push update: manca MOBILE_UPDATE_BASE_URL o MOBILE_PUSH_NOTIFY_TOKEN."
            exit 0
          fi

          notify_url="${MOBILE_UPDATE_BASE_URL%/}/internal/mobile-updates/notify"
          if ! curl -fsS \
            -X POST \
            -H "x-release-token: ${MOBILE_PUSH_NOTIFY_TOKEN}" \
            -H "content-type: application/json" \
            "${notify_url}"; then
            echo "Notifica push update non inviata: release prosegue comunque."
          fi

  clear-mobile-release-status:
    name: Clear Mobile Release Status
    needs: [mark-mobile-release-in-progress, build-and-release-android, publish-mobile-update-feed]
    if: >-
      ${{
        always() &&
        github.repository == 'CarloBonvicini/work-hours-platform' &&
        (
          github.event_name == 'workflow_dispatch' ||
          startsWith(github.ref, 'refs/tags/mobile-v')
        )
      }}
    runs-on: self-hosted
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          clean: false

      - name: Clear release in progress marker
        shell: bash
        run: |
          rm -f infra/updates/release-status.json
